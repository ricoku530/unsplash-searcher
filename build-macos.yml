
name: Build macOS App on: workflow_dispatch: jobs: build-mios: runs-on: macos-latest steps: - name: Checkout code uses: actions/checkout@v4 - name: Set up Python uses: actions/setup-python@v5 with: python-version: ‘3.11’ - name: Install dependencies run: | python -m pip install --upgrade pip pip install requests pillow pyinstaller - name: Build macOS app run: | pyinstaller --onefile --windowed --name UnsplashSearch app.py mkdir -p dist/UnsplashSearch.app/Contents/MacOS mv dist/UnsplashSearch dist/UnsplashSearch.app/Contents/MacOS/ cat > dist/UnsplashSearch.app/Contents/Info.plist << ‘EOF’
<?xml version=“1.0” encoding=“UTF-8”?>
<!DOCTYPE plist PUBLIC “-//Apple//DTD PLIST 1.0//EN” “http://www.apple.com/DTDs/PropertyList-1.0.dtd”>
<plist version=“1.0”>
<dict>
<key>CFBundleName</key><string>UnsplashSearch</string>
<key>CFBundleDisplayName</key><string>UnsplashSearch</string>
<key>CFBundleIdentifier</key><string>com.unsplashsearch.app</string>
<key>CFBundleVersion</key><string>1.0.0</string>
<key>CFBundlePackageType</key><string>APPL</string>
<key>CFBundleExecutable</key><string>UnsplashSearch</string>
<key>LSMinimumSystemVersion</key><string>10.14</string>
<key>NSHighResolutionCapable</key><true/>
</dict>
</plist>
EOF cd dist && zip -r UnsplashSearch-macOS.zip UnsplashSearch.app - name: Upload artifact uses: actions/upload-artifact@v4 with: name: UnsplashSearch-macOS path: dist/UnsplashSearch-macOS.zip
