name: Build macOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pillow pyinstaller
    
    - name: Build macOS app
      run: |
        pyinstaller \
          --onefile \
          --windowed \
          --name "UnsplashSearch" \
          --add-data "config.py:." \
          --noconfirm \
          app.py
        
        # 创建 .app 包结构
        mkdir -p "dist/UnsplashSearch.app/Contents/MacOS"
        mkdir -p "dist/UnsplashSearch.app/Contents/Resources"
        
        # 移动可执行文件
        mv dist/UnsplashSearch "dist/UnsplashSearch.app/Contents/MacOS/"
        
        # 创建 Info.plist
        cat > "dist/UnsplashSearch.app/Contents/Info.plist" << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleName</key>
    <string>UnsplashSearch</string>
    <key>CFBundleDisplayName</key>
    <string>UnsplashSearch</string>
    <key>CFBundleIdentifier</key>
    <string>com.unsplashsearch.app</string>
    <key>CFBundleVersion</key>
    <string>1.0.0</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
    <key>CFBundleExecutable</key>
    <string>UnsplashSearch</string>
    <key>LSMinimumSystemVersion</key>
    <string>10.14</string>
    <key>NSHighResolutionCapable</key>
    <true/>
</dict>
</plist>
EOF
        
        # 打包为 zip 方便下载
        cd dist
        zip -r UnsplashSearch-macOS.zip UnsplashSearch.app
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: UnsplashSearch-macOS
        path: dist/UnsplashSearch-macOS.zip
    
    - name: Create Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v1
      with:
        files: dist/UnsplashSearch-macOS.zip
        tag_name: v${{ github.run_number }}
        name: UnsplashSearch macOS Build ${{ github.run_number }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
