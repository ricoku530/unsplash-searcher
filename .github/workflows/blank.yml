name: Build macOS App on: workflow_dispatch: jobs: build: runs-on: macos-latest steps: - uses: actions/checkout@v4 - name: Set up Python uses: actions/setup-python@v5 with: python-version: ‘3.11’ - name: Install dependencies run: pip install requests pillow pyinstaller - name: Build run: | pyinstaller --onefile --windowed --name UnsplashSearch app.py mkdir -p dist/UnsplashSearch.app/Contents/MacOS mv dist/UnsplashSearch dist/UnsplashSearch.app/Contents/MacOS/ cd dist && zip -r UnsplashSearch-macOS.zip UnsplashSearch.app - name: Upload uses: actions/upload-artifact@v4 with: name: UnsplashSearch-macOS path: dist/UnsplashSearch-macOS.zip
