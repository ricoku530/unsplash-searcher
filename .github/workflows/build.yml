name: Build macOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pillow pyinstaller

      - name: Build
        run: pyinstaller --onefile --name UnsplashSearch app.py

      - name: Create app bundle
        run: |
          mkdir -p dist/UnsplashSearch.app/Contents/MacOS
          mkdir -p dist/UnsplashSearch.app/Contents/Resources
          mv dist/UnsplashSearch dist/UnsplashSearch.app/Contents/MacOS/

      - name: Create Info.plist
        run: python3 create_plist.py

      - name: Package zip
        run: |
          cd dist
          zip -r UnsplashSearch-macOS.zip UnsplashSearch.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnsplashSearch-macOS
          path: dist/UnsplashSearch-macOS.zip
